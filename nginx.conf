server {
    listen 80;
    server_name localhost;
    
    # 全局默认根目录（指向 Vue 打包后的静态文件目录）
    root /usr/share/nginx/html;
    index index.html;

    # 1. 前端 Vue 路由处理
    # 如果找不到对应文件或目录，就回退给 index.html 交由 Vue Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. 代理 Django Admin 后台
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 防止后台进行大型数据库操作或文件上传时超时 502
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. 代理 Django 静态文件 (解决后台样式丢失)
    # ⚠️ 必须配合后端的 WhiteNoise 和 collectstatic 使用
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 针对 Django 静态文件开启缓存
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 4. 代理 Django API 接口
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. 前端 Vue 静态资源缓存 (针对 Vite 打包出的 assets 目录)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 优化点：严格限制，如果找不到资源直接返回 404，不要再傻傻回退给 index.html 浪费性能
        try_files $uri =404; 
    }
}